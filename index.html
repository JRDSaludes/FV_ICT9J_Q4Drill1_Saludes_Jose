<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kWh Checker</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:white;
    padding:30px;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    text-align:center;
}

h1{
    margin-bottom:10px;
}

h2{
    margin-top:0;
    color:#555;
}

textarea{
    width:220px;
    padding:8px;
    border:1px solid #ccc;
    border-radius:5px;
    resize:none;
    margin:15px 0;
}

.btn{
    background:#4CAF50;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:5px;
    cursor:pointer;
    font-size:14px;
}

.btn:hover{
    background:#43a047;
}
</style>
</head>

<body>

<div class="container">

<h1>JavaScript Conditional Statements</h1>
<h2>Check kWh</h2>

<textarea id="text" rows="4" cols="50" placeholder="Enter your kWh"></textarea>

<button class="btn" onclick="checkKWh()">Check kWh</button>

</div>

<script>

function checkKWh() {
    const kWh = parseInt(document.getElementById("text").value);

    if (kWh <= 100) {
        alert("You're a lifeline consumer.");
    } else if (kWh <=200) {
        alert("You're a low consumer.");
    } else if (kWh <=300) {
        alert("You're an average consumer.");
    } else if (kWh <=500) {
        alert("You're a high consumer.");
    } else {
        alert("You're a very high consumer.");
    }
}

</script>
</body>
</html>
