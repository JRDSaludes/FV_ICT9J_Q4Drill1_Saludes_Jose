<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        h2 {
            color: #666;
        }
        textarea {
            display: block;
            margin: 20px auto;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<textarea id="text" rows="4" cols="50" placeholder="Enter your kWh"></textarea>

    <h1>JavaScript Conditional Statements</h1>
    <h2>Check kWh</h2>
    <button class="btn" onclick="checkKWh()">Check kWh</button>



    <script>
       
        function checkKWh() {
           const kWh = parseInt(document.getElementById("text").value);
            if (kWh <= 100) {
                alert("You're a lifeline consumer.");
            } else if (kWh <=200) {
                alert("You're a low consumer.");
            } else if (kWh <=300) {
                alert("You're an average consumer.");
            } else if (kWh <=500) {
                alert("You're a high consumer.");
            } else {
                alert("You're a very high consumer.");
            }
        }
    </script>
</body>
</html>
